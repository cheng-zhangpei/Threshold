grpc:
  listen_addr: ":15001"
  rate_limit: 1000
  bucket_size: 2000

router:
  consumers: 2
  queue_size: 256

dispatch:
  min_workers: 2
  max_workers: 8
  scale_up_threshold: 100
  scale_up_step: 2
  max_queue_size: 256
  idle_timeout_sec: 30
  health_check_interval_sec: 5

fingerprint:
  db_path: "data/test-fingerprint.db"

portrait:
  db_path: "data/test-portrait.db"
  history_limit: 10

output:
  max_size: 1000

alert: {}

tls:
  enabled: false
