# configs/client.yaml

# 全局用户ID（如果各模块没有单独指定，则使用此值）
user_id: "default-user"

# ========== 模式一：原生 gRPC 代理（为 IDV Client 服务） ==========
proxy:
  listen_addr: "127.0.0.1:9091"
  server_addr: "127.0.0.1:50051"
  device_uuid: ""          # 留空则自动采集
  os_type: ""              # 留空则自动检测
  # user_id 可单独指定，若为空则使用全局 user_id

# ========== 模式二：SOCKS5 转 gRPC 代理（为通用应用服务） ==========
socks5:
  enabled: true            # 是否启用 SOCKS5 模式
  listen_addr: "127.0.0.1:1080"
  # user_id 可单独指定，若为空则使用全局 user_id
  # device_uuid 和 os_type 复用全局采集结果，无需重复配置

# ========== TLS 配置（全局生效） ==========
tls:
  mode: "strict"                      # strict(如果找不到证书就panic) | permissive(允许密文传输） | none ）
  ca_cert: "./data/ca/ca.crt"         # CA 证书路径
  client_cert: "./data/certs/test-device-uuid.crt"                     # 留空则自动按设备UUID或默认路径检测
  client_key: "./data/certs/test-device-uuid.key"                    # 留空同上
