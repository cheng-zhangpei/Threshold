# ============================================================
# Threshold 安全代理 - 服务端配置
# 说明: 本配置文件控制服务端所有模块的启动参数和行为
# ============================================================

# ============================================================
# gRPC 接入层配置
# ============================================================
grpc:
  # 监听地址，服务端对外暴露的 gRPC 端口
  # 格式: [host]:port，留空 ":port" 表示监听所有网卡
  listen_addr: ":50051"

  # 全局令牌桶限流 - 每秒产生的令牌数
  # 控制服务端能处理的最大请求速率，防止突发流量打崩下游
  rate_limit: 1000

  # 令牌桶容量 - 允许的突发请求数
  # 容量越大，突发容忍度越高，但会消耗更多内存
  bucket_size: 2000

# ============================================================
# 路由器配置（核心路由组件）
# 职责: 根据请求的 Method+Path 判定静态风险等级 (L0-L3)
# ============================================================
router:
  # 是否启用路由组件
  # 关闭后所有请求将跳过路由分级，直接进入 Dispatch（不推荐）
  enable: true

  # [已废弃] 旧版硬编码风险映射表文件路径
  # 留空表示不使用旧版映射表，完全依赖 r2_config
  operation_risk_file: ""

  # 新版配置驱动路由规则文件路径
  # 支持 HTTP 和 TCP 两种协议的分级规则配置
  # 详见 configs/router_rules.yaml 的规则格式
  r2_config: "./config/route_rule.yaml"

  # 路由消费者协程数
  # 控制并发处理路由请求的 goroutine 数量，建议设置为 CPU 核心数 * 2
  consumers: 4

  # 路由缓冲队列容量
  # 超过此容量时，新请求将触发背压（返回 THROTTLE），防止内存溢出
  queue_size: 4096

# ============================================================
# 调度器配置 (DispatchManager + WorkerPool)
# 职责: 管理 Worker 弹性伸缩，处理 L1-L3 级别的请求
# ============================================================
dispatch:
  # 是否启用调度器
  # 关闭后 L1-L3 请求将无法处理（建议始终开启）
  enable: true

  # 最小 Worker 数量（保底）
  # 即使没有请求也保持至少这些 Worker 存活，减少冷启动延迟
  min_workers: 2

  # 最大 Worker 数量（上限）
  # 防止资源过度消耗，根据机器性能调整
  max_workers: 64

  # 扩容阈值：队列深度超过此值触发扩容
  # 值越小响应越灵敏，但可能导致频繁扩缩容
  scale_up_threshold: 100

  # 扩容步长：每次扩容增加的 Worker 数量
  # 建议与 min_workers 保持一致或略小
  scale_up_step: 4

  # 内存队列最大容量
  # 超过此容量时任务溢出到 bbolt 冷存储，防止 OOM
  max_queue_size: 10000

  # Worker 空闲超时（秒）
  # 超过此时间没有任务处理的 Worker 将被回收
  idle_timeout_sec: 30

  # 健康检查间隔（秒）
  # 调度器巡检队列深度和 Worker 状态的频率
  health_check_interval_sec: 5
# ============================================================
# 设备指纹匹配引擎配置
# 职责: 六层 Hash 树存储和匹配设备指纹 (UUID/OS/IP/Port/Protocol/Reserved)
# ============================================================
# 标准模式（推荐生产使用）
fingerprint:
  db_path: "data/fingerprint.db"
  match_mode: "standard"
# 或者自定义逐维度配置
# fingerprint:
#   db_path: "data/fingerprint.db"
#   match_mode: "custom"
#   dimensions:
#     - name: "os"
#       action: "block"
#     - name: "ip"
#       action: "audit"
#     - name: "port"
#       action: "ignore"
#     - name: "protocol"
#       action: "audit"
# ============================================================
# 用户画像存储配置
# 职责: 维护用户历史行为摘要，供决策引擎使用
# ============================================================
portrait:
  # 是否启用用户画像功能
  # 关闭后决策引擎将无法获取历史行为数据，建议开启
  enable: true
  # 画像数据持久化存储路径
  db_path: "./data/portrait.db"
  # 每个用户保留的历史连接记录数
  # 决策引擎会读取最近 N 条记录进行行为分析
  # 值越大分析的样本越多，但存储开销也越大
  history_limit: 10
# ============================================================
# 输出缓冲区配置
# 职责: 暂存通过安全校验的请求，供下游 OpenStack 拉取
# ============================================================
output:
  # 缓冲区最大容量
  # 超过此容量时新的通过请求将被丢弃（极少数情况）
  max_size: 10000
  # 是否开启sender，推荐开启，开启之后安全代理变为透传
  # 每一个sender都会绑定一个队列，这里的消费也是并行的消费，这种设计方式也是为了最大程度避免锁竞争
  sender_enable: true
  sender_workers: 4
  sender_queue_size: 1024
# ============================================================
# 告警队列配置
# 职责: 存储被阻断/告警的请求，推送给管理员监控端
# ============================================================
alert: {}
# 当前为空结构，后续可扩展告警相关配置
# 如: 告警去重时间窗口、告警级别阈值等

# ============================================================
# TLS/mTLS 加密传输配置
# 职责: 保障客户端与服务端之间的 gRPC 通信安全
# ============================================================
tls:
  # 是否启用 TLS 加密
  # 生产环境必须启用，原型阶段可关闭以简化调试
  enabled: false

  # 服务端证书文件路径（PEM 格式）
  cert_file: ""

  # 服务端私钥文件路径（PEM 格式）
  key_file: ""

  # CA 证书文件路径（PEM 格式）
  # 启用 mTLS 时，用于验证客户端证书
  ca_file: ""

  # 是否要求客户端提供证书（双向 TLS）
  # true: 客户端必须提供由 ca_file 签名的证书
  # false: 仅服务端提供证书（单向 TLS）
  require_client_auth: false
# ============================================================
# Mode 3: 直连模式 (Direct Connect) 配置
# 说明: 客户端通过 LD_PRELOAD 劫持 TCP 连接，经 TLS 直连安全代理
# ============================================================
direct_connect:
  # 是否启用直连模式
  # true:  监听 :9999 端口，接受 libthreshold.so 客户端连接
  # false: 不启动直连监听器，仅保留 gRPC 接入层
  enabled: true

  # 监听地址，客户端的 libthreshold.so 将连接此地址
  # 格式: [host]:port，留空 ":port" 表示监听所有网卡
  listen_addr: ":9999"

  # TLS 服务端证书文件路径（PEM 格式）
  # 客户端需要信任签发此证书的 CA，否则 TLS 握手失败
  cert_file: "./data/certs/server.crt"

  # TLS 服务端私钥文件路径（PEM 格式）
  # 私钥文件权限建议设为 0600
  key_file: "./data/certs/server.key"

  # ----------------------------------------------------------
  # 连接池配置
  # 直连模式通过连接池复用到目标服务器的 TCP 连接
  # 减少每请求一次 TCP 三次握手的开销（~1-2ms/次）
  # ----------------------------------------------------------

  # 全局最大连接数（连接池上限 + 并发连接信号量容量）
  # 超过此值的新建连接将被拒绝，返回 RATE_LIMITED 状态
  # 建议: 根据后端服务器承载能力和机器 fd 上限调整
  # 生产推荐: 500-2000
  max_conns: 1000

  # 单个目标地址的最大池化连接数
  # 每个目标维护一个 LIFO 栈，最近使用的连接优先复用
  # 值越大连接复用率越高，但会占用更多 fd 和内存
  # 建议: 10-50，取决于单目标的并发请求数
  max_per_host: 20

  # 连接最大存活时间（硬上限）
  # 无论连接是否仍在使用，超过此时间后将被后台清理协程回收
  # 用于防止长时间存活的连接因中间 NAT/防火墙超时而变成半死连接
  # 格式: Go duration，如 "30m"、"1h"
  max_lifetime: "30m"

  # 连接最大空闲时间
  # 超过此时间未被复用的连接将被后台清理协程回收
  # 基于连接的 lastUsed 时间判断，每次复用时更新
  # 建议: 小于 max_lifetime，通常为 max_lifetime 的 1/5 ~ 1/6
  max_idle: "5m"

  # ----------------------------------------------------------
  # 清理协程配置
  # 后台定时检查连接池中的过期和死连接并回收
  # ----------------------------------------------------------

  # 清理协程唤醒间隔
  # 每隔此时间扫描一次全池，剔除过期（max_lifetime）、
  # 空闲超时（max_idle）和探活失败（isAlive）的连接
  # 值越小清理越及时，但 CPU 开销略增
  # 建议: 15s-60s
  janitor_interval: "30s"

  # ----------------------------------------------------------
  # 超时配置
  # 控制各个阶段的最大等待时间，防止慢连接占用资源
  # ----------------------------------------------------------

  # TCP 连接建立超时
  # 从池中无可用连接时，新建到目标服务器的 TCP 连接的最大等待时间
  # 目标服务器不可达时，超过此时间返回错误
  dial_timeout: "5s"

  # TLS 握手 + 首帧读取超时
  # 客户端连接后必须在此时间内完成 TLS 握手并发送握手包
  # 防止 slowloris 类攻击（连上后什么都不发，占用连接不释放）
  # 建议: 5s-15s
  tls_handshake_timeout: "10s"

  # 请求循环每帧读取超时
  # 长连接场景下，客户端可能间隔较长时间才发送下一个请求
  # 超过此时间未收到新帧则关闭连接，释放资源
  # 建议: 30s-120s，根据业务场景调整
  # 注意: 设太短会误杀正常长连接（如 curl 等待用户输入）
  request_read_timeout: "60s"

  # 转发写入超时
  # 向目标服务器发送请求数据的最大等待时间
  write_timeout: "10s"

  # 转发读取超时
  # 从目标服务器读取响应数据的最大等待时间
  # 后端慢查询或无响应时，超过此时间返回 RATE_LIMITED
  read_timeout: "10s"

  # ----------------------------------------------------------
  # 帧大小限制
  # 二进制帧协议的载荷上限，防止畸形请求导致 OOM
  # ----------------------------------------------------------

  # 单帧最大载荷（字节）
  # 客户端每帧数据不允许超过此值，超过则拒绝读取并关闭连接
  # 应用层一般单次 write 在 1KB-64KB，1MB 是纯防御性上限
  # 1048576 = 1MB
  max_payload_size: 1048576

  # 后端响应体最大值（字节）
  # 超过此值的响应会被截断并返回错误，防止后端异常导致 OOM
  # 10485760 = 10MB
  max_response_size: 10485760
wal_dir: "./data/wal"